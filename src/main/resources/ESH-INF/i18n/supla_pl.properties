# binding
# binding
binding.supla.name=Binding Supla
binding.supla.description=\
  			<p>\
                Dost\ufffdpne na rynku systemy automatyki budynkowej s\ufffd zazwyczaj bardzo z\ufffdo\ufffdone, zamkni\ufffdte i kosztowne. \
                W wielu przypadkach wymagaj\ufffd instalacji ju\ufffd na etapie budowy obiektu. SUPLA jest prosta, otwarta i \
                bezp\ufffdatna. Umo\ufffdliwia budowanie element\ufffdw wykonawczych w oparciu o platformy RaspberryPI, Arduino czy \
                te\ufffd ESP8266 i \ufffd\ufffdczenie ich ze sob\ufffd z wykorzystaniem sieci LAN oraz WiFi. Dzi\ufffdki SUPLI mo\ufffdesz mi\ufffddzy \
                innymi sterowa\ufffd o\ufffdwietleniem, w\ufffd\ufffdcza\ufffd i wy\ufffd\ufffdcza\ufffd urz\ufffddzenia AGD i RTV, otwiera\ufffd i zamyka\ufffd bramy oraz \
                drzwi, czy te\ufffd kontrolowa\ufffd temperatur\ufffd w pomieszczeniach. Wszystko to mo\ufffdesz zrobi\ufffd jednym \
                przesuni\ufffdciem palca. SUPLA dost\ufffdpna jest wsz\ufffddzie tam, gdzie posiadasz dost\ufffdp do sieci Internet i masz \
                pod r\ufffdk\ufffd smartfon lub tablet. SUPLA rozwijana jest na zasadach Otwartego Oprogramowania oraz Otwartego \
                Sprz\ufffdtu, dzi\ufffdki czemu Ty r\ufffdwnie\ufffd mo\ufffdesz rozwija\ufffd ten projekt!\
            </p>\
            <h4>Supla Cloud</h4>\
            <p>\
                SUPLA-CLOUD jest punktem centralnym \ufffd\ufffdcz\ufffdcym ze sob\ufffd urz\ufffddzenia wykonawcze, kt\ufffdre steruj\ufffd po\ufffdrednio \
                lub bezpo\ufffdrednio wyposa\ufffdeniem Twojego domu, oraz firmy z aplikacjami klienckimi, kt\ufffdre mo\ufffdesz \
                zainstalowa\ufffd na swoich tabletach oraz smartfonach. Oprogramowanie to pozwala na zarz\ufffddzanie z jednego \
                miejsca ca\ufffd\ufffd infrastruktur\ufffd systemu przy u\ufffdyciu dowolnej - nowoczesnej przegl\ufffddarki internetowej. \
                Dost\ufffdp do serwera jest bezp\ufffdatny. Mo\ufffdesz r\ufffdwnie\ufffd uruchomi\ufffd w\ufffdasny niezale\ufffdny serwer pracuj\ufffdcy w sieci \
                Internet lub w obr\ufffdbie sieci domowej, wykorzystuj\ufffdc do tego \ufffdr\ufffdd\ufffda systemu, kt\ufffdre s\ufffd do pobrania w \
                serwisie GITHUB.\
            </p>\
            <p>\
                More info:\
                <ol>\
                    <li>Strona g\ufffd\ufffdwna Supli: <a href="https://www.supla.org/">https://www.supla.org/</a></li>\
                    <li>Binding Supla na Github: <a href="https://github.com/SUPLA/openhab2-addons">https://github.com/SUPLA/openhab2-addons</a>.</li>\
                    <li>W\ufffdtek na forum o tym projekcie: <a href="https://forum.supla.org/viewtopic.php?f=24&t=4595">https://forum.supla.org/viewtopic.php?f=24&t=4595</a>.</li>\
                </ol>\
            </p>
